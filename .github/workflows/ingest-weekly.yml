name: Ingest Semanal (IPE + VLMO)

on:
  schedule:
    - cron: '0 8 * * 0'   # domingo 08:00 UTC (05:00 BRT)
  workflow_dispatch:        # permite rodar manualmente

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/ingest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r ../../requirements.txt

      - name: Ingest companies (watchlist)
        run: python ingest_companies.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest IPE metadata
        run: python ingest_ipe.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest VLMO
        run: python ingest_vlmo.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest FRE
        run: python ingest_fre.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Extract PDFs (batch 150 docs mais recentes)
        run: python extract_pdf.py --limite 150
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
