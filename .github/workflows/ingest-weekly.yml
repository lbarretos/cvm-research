name: Ingest Semanal (IPE + VLMO + DFP + ITR)

on:
  schedule:
    - cron: '30 11 * * 1'  # segunda 11:30 UTC (08:30 BRT)
  workflow_dispatch:        # permite rodar manualmente

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/ingest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r ../../requirements.txt

      - name: Run tests
        run: python -m pytest ../../tests/ -v

      - name: Ingest companies (watchlist)
        run: python ingest_companies.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest IPE metadata
        run: python ingest_ipe.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest VLMO
        run: python ingest_vlmo.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest FRE
        run: python ingest_fre.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest DFP (demonstrativos anuais)
        run: python ingest_dfp.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest ITR (demonstrativos trimestrais)
        run: python ingest_itr.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Extract PDFs (batch 150 docs mais recentes)
        run: python extract_pdf.py --limite 150
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
