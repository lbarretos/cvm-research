name: Ingest Semanal (IPE + VLMO)

on:
  schedule:
    - cron: '30 11 * * 1'  # segunda 11:30 UTC (08:30 BRT)
  workflow_dispatch:        # permite rodar manualmente

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/ingest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r ../../requirements.txt

      - name: Ingest companies (watchlist)
        run: python ingest_companies.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest IPE metadata
        run: python ingest_ipe.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest VLMO
        run: python ingest_vlmo.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Ingest FRE
        run: python ingest_fre.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Extract PDFs (batch 150 docs mais recentes)
        run: python extract_pdf.py --limite 150
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
